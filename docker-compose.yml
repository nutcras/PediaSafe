services:

  # ─── Hono API (@lava/api) ──────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile        # multi-stage Bun image at repo root
    container_name: pediasafe-api-server
    restart: unless-stopped
    ports:
      - "${API_HOST_PORT:-3200}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: "${DATABASE_URL}"
      LINE_CHANNEL_SECRET: "${LINE_CHANNEL_SECRET}"
      LINE_CHANNEL_ACCESS_TOKEN: "${LINE_CHANNEL_ACCESS_TOKEN}"
      DASHBOARD_URL: "${DASHBOARD_URL}"
    networks:
      - default
      - db_net
      - redis_net
      - minio_net

  # ─── Next.js LIFF Web App (@lava/web) ─────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # ⚠️  These are baked into the JS bundle at BUILD time.
        #     Changing them here requires a rebuild (`docker compose build web`).
        NEXT_PUBLIC_LIFF_ID: "${NEXT_PUBLIC_LIFF_ID}"
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
    container_name: pediasafe-web
    restart: unless-stopped
    ports:
      - "${WEB_HOST_PORT:-3201}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      - api
    networks:
      - default

networks:
  # Network ของตัวเอง
  default:

  # เชื่อมต่อไปยัง Network ภายนอกที่ Container อื่นๆ รันอยู่
  db_net:
    external: true
    name: api_smart-restaurant-network
  redis_net:
    external: true
    name: redis_redis-network
  minio_net:
    external: true
    name: minio_default
