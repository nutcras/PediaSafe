services:

  # ─── Hono API (@pedia/api) ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile        # multi-stage Bun image at repo root
    container_name: pediasafe-api-server
    restart: unless-stopped
    ports:
      - "${API_HOST_PORT:-3200}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: "${DATABASE_URL}"
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
    networks:
      - default
      - db_net
      - redis_net
      - minio_net

  # ─── Next.js Web App (@pedia/web) ──────────────────────────────────────────
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # ⚠️  This is baked into the JS bundle at BUILD time.
        #     Changing it here requires a rebuild (`docker compose build web`).
        NEXT_PUBLIC_API_URL: "${NEXT_PUBLIC_API_URL}"
    container_name: pediasafe-web
    restart: unless-stopped
    ports:
      - "${WEB_HOST_PORT:-3201}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
    depends_on:
      - api
    networks:
      - default

networks:
  # Network ของตัวเอง
  default:

  # เชื่อมต่อไปยัง Network ภายนอกที่ Container อื่นๆ รันอยู่
  db_net:
    external: true
    name: api_smart-restaurant-network
  redis_net:
    external: true
    name: redis_redis-network
  minio_net:
    external: true
    name: minio_default
