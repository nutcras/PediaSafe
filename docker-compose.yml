services:

  # ─── Hono API (@pedia/api) ─────────────────────────────────────────────────
  # Internal-only: no host port is published. The web container reaches it over
  # the shared bridge network via its container name (pediasafe-api-server).
  api:
    build:
      context: .
      dockerfile: Dockerfile        # multi-stage Bun image at repo root
    container_name: pediasafe-api-server
    restart: unless-stopped
    expose:
      - "3000"                      # visible to other containers on the network only
    environment:
      NODE_ENV: production
      PORT: "3000"
      DATABASE_URL: "${DATABASE_URL}"
      CORS_ORIGIN: "${CORS_ORIGIN:-*}"
      JWT_SECRET: "${JWT_SECRET}"
    networks:
      - pediasafe_net               # shared with web for internal DNS
      - db_net
      - redis_net
      - minio_net

  # ─── Next.js Web App (@pedia/web) ──────────────────────────────────────────
  # The only service published to the host. Acts as the proxy: browser → web
  # (/api/*) → Hono API over the internal network (see next.config.mjs rewrites).
  web:
    build:
      context: .
      dockerfile: Dockerfile.web
      args:
        # Baked into the build so next.config rewrites() resolves the proxy
        # target at `next build` time. Must match the API container name + port.
        INTERNAL_API_URL: "${INTERNAL_API_URL:-http://pediasafe-api-server:3000}"
    container_name: pediasafe-web
    restart: unless-stopped
    ports:
      - "${WEB_HOST_PORT:-3201}:3000"
    environment:
      NODE_ENV: production
      PORT: "3000"
      # Runtime target for server-side fetches (lib/api.ts) — same value.
      INTERNAL_API_URL: "${INTERNAL_API_URL:-http://pediasafe-api-server:3000}"
    depends_on:
      - api
    networks:
      - pediasafe_net

networks:
  # Custom bridge shared by web + api so Docker's embedded DNS lets the web
  # container resolve "pediasafe-api-server" to the API container.
  pediasafe_net:
    driver: bridge

  # External infrastructure networks the API connects out to.
  db_net:
    external: true
    name: api_smart-restaurant-network
  redis_net:
    external: true
    name: redis_redis-network
  minio_net:
    external: true
    name: minio_default
